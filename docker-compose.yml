# docker-compose.yml — Development deployment (two server instances on one machine)
#
# Runs provider-facing and processing-pipeline as separate services.
#
# For split deployment across machines, use:
#   deploy/docker-compose.provider.yml   (provider-facing server)
#   deploy/docker-compose.pipeline.yml   (processing pipeline server)

version: "3.9"

services:
  # ── Provider-facing API (port 8000) ─────────────────────────────────
  api-provider:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./ai-scribe-data:/app/ai-scribe-data
      - ./output:/app/output
      - ./config:/app/config
    environment:
      - AI_SCRIBE_SERVER_ROLE=provider-facing
      - AI_SCRIBE_DATA_DIR=/app/ai-scribe-data
      - AI_SCRIBE_OUTPUT_DIR=/app/output
      - AI_SCRIBE_CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Processing-pipeline API (port 8100) ─────────────────────────────
  api-pipeline:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8100:8100"
    volumes:
      - ./pipeline-data:/app/pipeline-data
      - ./pipeline-output:/app/pipeline-output
      - ./config:/app/config
    environment:
      - AI_SCRIBE_SERVER_ROLE=processing-pipeline
      - AI_SCRIBE_DATA_DIR=/app/pipeline-data
      - AI_SCRIBE_OUTPUT_DIR=/app/pipeline-output
      - AI_SCRIBE_CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Provider web portal (port 3000) ─────────────────────────────────
  web:
    build:
      context: ./client/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SERVER_ROLE=provider-facing
    depends_on:
      - api-provider
    restart: unless-stopped

