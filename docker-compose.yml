version: "3.9"

services:
  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output:ro
      - ./data:/app/data:ro
      - ./config:/app/config:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Next.js web viewer ─────────────────────────────────────────────────────
  web:
    build:
      context: ./client/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

