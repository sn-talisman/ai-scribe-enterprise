# docker-compose.yml — Single-server deployment (both roles)
#
# Runs both provider-facing and processing-pipeline roles on one machine.
# This is the default development/single-server mode.
#
# For split deployment, use:
#   deploy/docker-compose.provider.yml   (provider-facing server)
#   deploy/docker-compose.pipeline.yml   (processing pipeline server)

version: "3.9"

services:
  # ── FastAPI backend (both roles) ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./ai-scribe-data:/app/ai-scribe-data
      - ./output:/app/output
      - ./config:/app/config
    environment:
      - AI_SCRIBE_SERVER_ROLE=both
      - AI_SCRIBE_DATA_DIR=/app/ai-scribe-data
      - AI_SCRIBE_OUTPUT_DIR=/app/output
      - AI_SCRIBE_CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Next.js web viewer ───────────────────────────────────────────────
  web:
    build:
      context: ./client/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_SERVER_ROLE=both
    depends_on:
      - api
    restart: unless-stopped

