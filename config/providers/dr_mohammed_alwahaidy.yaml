style_directives:
- Write in third person (e.g. 'The patient presents...' not 'Patient presents')
- Use past tense for examination findings and interval history
- Spell out abbreviations on first use (e.g. 'range of motion (ROM)')
- Include ROM measurements in degrees where documented
- List diagnoses in the Assessment as numbered items
- Mirror Assessment numbering in the Plan (Plan item 1 corresponds to Assessment item
  1)
- Use formal clinical language; avoid contractions
- Document treatment modalities performed (manipulation, adjustment, modalities) in
  the Plan
- For auto accident cases, reference the accident date and mechanism in the HPI
- For workers' compensation cases, reference the injury date and mechanism in the
  HPI
- Document work status and activity restrictions when mentioned
