style_directives:
- Write in third person (e.g. 'The patient presents...' not 'Patient presents')
- Use past tense for examination findings and interval history
- Spell out abbreviations on first use (e.g. 'electroencephalogram (EEG)')
- List diagnoses in the Assessment as numbered items
- Mirror Assessment numbering in the Plan (Plan item 1 corresponds to Assessment item
  1)
- Use formal clinical language; avoid contractions
- Document neurological exam findings systematically (mental status, cranial nerves,
  motor, sensory, reflexes, gait)
- For post-traumatic headache evaluations, document headache frequency, duration,
  and severity scale
- Reference prior imaging results (CT, MRI) and their findings in the Assessment
- Document work status and activity restrictions when mentioned
- For injury cases, reference the injury date and mechanism in the HPI
