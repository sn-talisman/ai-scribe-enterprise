# deploy/docker-compose.provider.yml — Provider-facing server deployment
#
# Runs the provider-facing API + client web UI.
# Connects to the processing pipeline server for pipeline execution.
#
# Usage:
#   docker-compose -f deploy/docker-compose.provider.yml up
#
# Configuration:
#   Set PIPELINE_API_URL to point to the processing pipeline server.

version: "3.9"

services:
  # ── Provider-facing API ────────────────────────────────────────────────
  provider-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.provider
    ports:
      - "${PROVIDER_API_PORT:-8000}:8000"
    volumes:
      - ${DATA_DIR:-../ai-scribe-data}:/app/ai-scribe-data:ro
      - ${OUTPUT_DIR:-../output}:/app/output
      - ${CONFIG_DIR:-../config}:/app/config
    environment:
      - AI_SCRIBE_SERVER_ROLE=provider-facing
      - AI_SCRIBE_DATA_DIR=/app/ai-scribe-data
      - AI_SCRIBE_OUTPUT_DIR=/app/output
      - AI_SCRIBE_CONFIG_DIR=/app/config
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Client web UI ─────────────────────────────────────────────────────
  client-web:
    build:
      context: ../client/web
      dockerfile: Dockerfile
    ports:
      - "${CLIENT_WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${PROVIDER_API_PORT:-8000}
      - NEXT_PUBLIC_SERVER_ROLE=provider-facing
    depends_on:
      - provider-api
    restart: unless-stopped
